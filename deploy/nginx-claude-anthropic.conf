# Claude → GLM redirect: TLS-терминация api.anthropic.com на LAN-интерфейсе.
#
# Поставить в /etc/nginx/sites-available/ + symlink в sites-enabled/, затем:
#   sudo nginx -t && sudo systemctl reload nginx
#
#   sudo cp deploy/nginx-claude-anthropic.conf /etc/nginx/sites-available/claude-anthropic
#   sudo ln -s /etc/nginx/sites-available/claude-anthropic /etc/nginx/sites-enabled/
#
# Лист-сертификат от gen-claude-ca.sh: /etc/nginx/ssl/claude-api.{crt,key}
# Слушает ТОЛЬКО LAN-IP 192.168.100.1:8443 — отдельный сокет (не тенится briefing'овским
# 0.0.0.0:443); DNAT переписывает :443→:8443. С WAN недоступен вообще.

server {
    listen 192.168.100.1:8443 ssl;
    server_name api.anthropic.com;

    ssl_certificate     /etc/nginx/ssl/claude-api.crt;
    ssl_certificate_key /etc/nginx/ssl/claude-api.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # inference → панель (POST /v1/messages* → GLM через z.ai).
    # Префикс /v1/messages покрывает и /v1/messages/count_tokens.
    location /v1/messages {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;          # стриминг SSE без буферизации
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding on;
    }

    # всё остальное (auth/OAuth/телеметрия/модели) → настоящий Anthropic.
    # Переменная + resolver → рантайм-резолв (IP api.anthropic.com может меняться).
    location / {
        resolver 127.0.0.1 valid=30s;
        set $anthropic_upstream https://api.anthropic.com;
        proxy_pass $anthropic_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }
}
