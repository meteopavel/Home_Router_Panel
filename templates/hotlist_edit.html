{% extends "base.html" %}

{% block content %}

<section class="section">
    <div class="section-header">
        <div>
            <h2>{{ hotlist.name }}</h2>
            <p>{{ hotlist.path }}</p>
        </div>
        <a class="button" href="/zapret">Назад</a>
    </div>

    {% if restart_error %}
        <div style="margin-bottom: 16px; padding: 10px 14px; background: rgba(248,113,113,0.1);
                    border: 1px solid rgba(248,113,113,0.35); border-radius: var(--radius-btn);
                    font-size: 13px; color: var(--red);">
            Файл сохранён, но zapret не перезапустился: {{ restart_error }}
        </div>
    {% elif request.query_params.get('saved') %}
        <div style="margin-bottom: 16px; padding: 10px 14px; background: rgba(74,222,128,0.1);
                    border: 1px solid rgba(74,222,128,0.25); border-radius: var(--radius-btn);
                    font-size: 13px; color: var(--green);">
            Сохранено. zapret перезапущен.
        </div>
    {% endif %}

    <form method="post" action="/hotlists/{{ hotlist.name }}/edit">
        <textarea class="editor" name="content">{{ hotlist.text }}</textarea>
        <div class="actions editor-actions">
            <button class="button" type="submit">Сохранить</button>
            <a class="button" href="/zapret">Отмена</a>
        </div>
    </form>
</section>

{% endblock %}
