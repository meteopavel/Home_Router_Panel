<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='/favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
</head>
<body>
<div class="page">
    <header class="header">
        <div>
            <div class="eyebrow">Локальная панель</div>
            <h1>{{ title }}</h1>
        </div>

        <div class="header-badge">
            <span class="status-dot status-dot-green"></span>
            Онлайн
        </div>
    </header>

    <nav class="tabs">
        <a class="tab {% if active_tab == 'overview' %}tab-active{% endif %}" href="/">Обзор</a>
        <a class="tab {% if active_tab == 'zapret' %}tab-active{% endif %}" href="/zapret">zapret</a>
        <a class="tab {% if active_tab == 'amnezia' %}tab-active{% endif %}" href="/amnezia">AmneziaWG</a>
    </nav>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        Home Router Panel · local network only
    </footer>
</div>
</body>
</html>
